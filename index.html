<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PinTracker Pro</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff5722">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🎳 PinTracker Pro</h1>
  </header>

  <main>
    <section id="login-section">
      <h2>Welcome Back</h2>
      <p>Sign in to track your stats and compete.</p>
      <button id="login-btn">Sign in with Google</button>
    </section>

    <section id="app-section" style="display: none;">
      
      <div class="profile-card">
        <img id="user-photo" src="" alt="Profile Photo">
        <h2 id="user-name">Bowler</h2>
        <div class="stats-grid">
          <div class="stat-box">
            <h3>Average</h3>
            <p id="stat-avg">0</p>
          </div>
          <div class="stat-box">
            <h3>High Game</h3>
            <p id="stat-high">0</p>
          </div>
          <div class="stat-box">
            <h3>1st Ball Avg</h3>
            <p id="stat-first">0.0</p>
          </div>
          <div class="stat-box">
            <h3>Open Frames</h3>
            <p id="stat-open">0%</p>
          </div>
        </div>
      </div>

      <div class="log-game-card">
        <h3>Log Game</h3>
        
        <div id="game-status">
          <span id="current-frame-display">Frame: 1</span> | 
          <span id="current-throw-display">Throw: 1</span>
        </div>

        <div class="pin-deck">
          <div class="pin-row">
            <div class="pin" data-pin="7">7</div>
            <div class="pin" data-pin="8">8</div>
            <div class="pin" data-pin="9">9</div>
            <div class="pin" data-pin="10">10</div>
          </div>
          <div class="pin-row">
            <div class="pin" data-pin="4">4</div>
            <div class="pin" data-pin="5">5</div>
            <div class="pin" data-pin="6">6</div>
          </div>
          <div class="pin-row">
            <div class="pin" data-pin="2">2</div>
            <div class="pin" data-pin="3">3</div>
          </div>
          <div class="pin-row">
            <div class="pin" data-pin="1">1</div>
          </div>
        </div>

        <div class="throw-controls">
          <button id="gutter-btn" class="secondary">Gutter (0)</button>
          <button id="record-throw-btn">Record Throw</button>
        </div>
        
        <p id="game-feedback"></p>
      </div>
      
      <button id="logout-btn" class="secondary">Sign Out</button>
    </section>
  </main>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(err => console.error(err));
    }
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
